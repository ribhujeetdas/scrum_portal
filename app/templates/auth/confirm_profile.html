<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Confirm Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>

  <body class="bg-light">
    <div class="container py-5" style="max-width: 720px;">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h3 class="mb-3">Confirm your Jira Profile</h3>

          <div class="alert alert-info">
            Please confirm the details fetched from Jira.
          </div>

          <ul class="list-group mb-3">
            <li class="list-group-item d-flex justify-content-between">
              <span class="fw-semibold">EID (name)</span>
              <span>{{ profile.eid }}</span>
            </li>
            <li class="list-group-item d-flex justify-content-between">
              <span class="fw-semibold">Email</span>
              <span>{{ profile.email }}</span>
            </li>
            <li class="list-group-item d-flex justify-content-between">
              <span class="fw-semibold">Name (displayName)</span>
              <span>{{ profile.display_name }}</span>
            </li>
          </ul>

          <form method="POST">
            {{ form.hidden_tag() }}
            {{ form.submit(class="btn btn-success") }}
            <a class="btn btn-outline-secondary" href="{{ url_for('auth.signup') }}">Start Over</a>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
