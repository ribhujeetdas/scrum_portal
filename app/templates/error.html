{% extends "base.html" %}
{% block title %}Error{% endblock %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <div class="alert alert-danger mb-0">
      <h4 class="alert-heading">Error {{ code }}</h4>
      <p class="mb-0">{{ message }}</p>
    </div>

    <div class="mt-3">
      {% if current_user.is_authenticated %}
        <a class="btn btn-primary" href="{{ url_for('aliases.dashboard') }}">Go to Home</a>
      {% else %}
        <a class="btn btn-primary" href="{{ url_for('aliases.auth_login') }}">Go to Login</a>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
