{% extends "base.html" %}
{% block title %}Jira Automation Rule Copier{% endblock %}

{% block content %}

<div id="ruleCopierPage"
     data-feature-script-src="{{ url_for('static', filename='js/rule_copier.js') }}"
     data-boards="{{ boards_by_project|tojson|forceescape }}">
<div id="loadingOverlay" class="loading-overlay" aria-hidden="true">
  <div class="text-center">
    <div class="spinner-border text-light" role="status" style="width: 3rem; height: 3rem;">
      <span class="visually-hidden">Loading...</span>
    </div>
    <div class="mt-3 text-light fw-semibold">Please wait...</div>
    <!-- <div class="text-light-50 small">UI is locked until the operation completes.</div> -->
  </div>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    <h3 class="mb-2">Jira Automation Rule Copier</h3>

    <input type="hidden" id="csrfToken" value="{{ csrf_token() }}">

    <div class="row g-3 align-items-end">
      <div class="col-md-3">
        <label class="form-label">Project Key (Source)</label>
        <select id="srcProject" class="form-select">
          <option value="">-- Select Project --</option>
          {% for pk in projects %}
            <option value="{{ pk }}">{{ pk }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="col-md-4">
        <label class="form-label">Board (Source)</label>
        <select id="srcBoard" class="form-select" disabled>
          <option value="">-- Select Board --</option>
        </select>
      </div>

      <div class="col-md-3">
        <label class="form-label">Rule ID (Numeric)</label>
        <!-- <input id="ruleId" type="number" class="form-control" min="1" step="1" placeholder="e.g. 1234"> -->
        <input
  id="ruleId"
  type="text"
  class="form-control"
  placeholder="e.g. 1234"
  inputmode="numeric"
  pattern="[0-9]*"
  autocomplete="off"
>
      </div>

          <div class="col-md-2">
      <button id="fetchRuleBtn" class="btn btn-success" disabled>Fetch Rule</button>
    </div>

    </div>

    <div class="mt-3">
      <div id="fetchMsg"></div>
    </div>

    <div id="ruleDetailsCard" class="card mt-3 d-none">
      <div class="card-body">
        <h5 class="mb-3">Fetched Rule Details</h5>
        <div><span class="fw-semibold">Rule ID:</span> <span id="outRuleId"></span></div>
        <div><span class="fw-semibold">Rule Name:</span> <span id="outRuleName"></span></div>
        <div><span class="fw-semibold">State:</span> <span id="outRuleState"></span></div>
      </div>
    </div>

    <div id="confirmSection" class="mt-3 d-none">
      <button id="confirmBtn" class="btn btn-primary" disabled>Confirm Details</button>
    </div>

    <div id="step2" class="mt-4 d-none">
      <hr>
      <h5 class="mb-3">Step 2: Destination</h5>

      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Project Key (Destination)</label>
          <select id="dstProject" class="form-select">
            <option value="">-- Select Project --</option>
            {% for pk in projects %}
              <option value="{{ pk }}">{{ pk }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-5">
          <label class="form-label">Board (Destination)</label>
          <select id="dstBoard" class="form-select" disabled>
            <option value="">-- Select Board --</option>
          </select>
        </div>

        <div class="col-md-3 d-flex align-items-end">
          <button id="copyRuleBtn" class="btn btn-warning w-100" disabled>Copy Rule</button>
        </div>
      </div>

      <div class="mt-3" id="copyMsg"></div>
    </div>

  </div>
</div>

</div>

{% endblock %}
